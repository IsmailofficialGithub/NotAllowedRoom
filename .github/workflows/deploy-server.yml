name: Deploy Server

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch:

concurrency:
  group: deploy-server-main
  cancel-in-progress: true

jobs:
  verify-server:
    name: Verify Server
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: notallowedroom_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: server

    env:
      PORT: 9000
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/notallowedroom_ci
      FRONT_CORS: "*"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install packages
        run: npm ci

      - name: Check server syntax
        run: node --check src/index.js

      - name: Run migrations
        run: npm run migrate

      - name: Build if present
        run: npm run build --if-present

      - name: Start server and verify health
        run: |
          npm start > /tmp/notallowedroom-server.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS "http://127.0.0.1:${PORT}/health"; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/notallowedroom-server.log
          exit 1

  deploy-server:
    name: Deploy Server
    runs-on: ubuntu-latest
    needs: verify-server

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            set -e

            cd /srv/notallowedroom/server/NotAllowedRoom
            git pull --ff-only origin main

            cd server
            npm ci
            npm run migrate
            npm run build --if-present

            pm2 reload notallowedroom-server --update-env

            PM2_PORT="$(node -e "const apps=JSON.parse(require('child_process').execSync('pm2 jlist',{encoding:'utf8'})); const app=apps.find(a=>a.name==='notallowedroom-server'); console.log(app?.pm2_env?.PORT || '')" 2>/dev/null || true)"
            ENV_PORT="$(grep -E '^PORT=' .env 2>/dev/null | tail -n 1 | cut -d '=' -f 2 || true)"
            PARENT_ENV_PORT="$(grep -E '^PORT=' ../.env 2>/dev/null | tail -n 1 | cut -d '=' -f 2 || true)"
            HEALTH_PORTS="$(printf "%s\n%s\n%s\n3000\n9000" "$PM2_PORT" "$ENV_PORT" "$PARENT_ENV_PORT" | awk 'NF && !seen[$0]++')"

            for i in $(seq 1 30); do
              for APP_PORT in $HEALTH_PORTS; do
                echo "Checking health on port ${APP_PORT}"
                if curl -fsS "http://127.0.0.1:${APP_PORT}/health"; then
                  exit 0
                fi
              done
              sleep 2
            done

            pm2 logs notallowedroom-server --lines 80 --nostream
            exit 1
